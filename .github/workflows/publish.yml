# =============================================================================
# PyPI Trusted Publishing (OIDC, no API token). MANUAL DISPATCH ONLY.
#
# This workflow has NO push/tag/release trigger, so merging it publishes
# nothing. It CAN publish, however, once (1) a Trusted Publisher for the
# `elphgap` project is registered on PyPI pointing at this repo + this workflow
# file + the `pypi` environment, and (2) the `pypi` GitHub environment exists
# with required reviewers. Until both are configured, a manual dispatch simply
# fails at the OIDC exchange. It is therefore gated, not inert.
#
# Guards baked in: it must be dispatched from an annotated version tag (refs/
# tags/vX.Y.Z) whose version equals elphgap.__version__, it runs `twine check`,
# and every action is pinned to a commit SHA.
# Refs: https://docs.pypi.org/trusted-publishers/using-a-publisher/
#       https://docs.pypi.org/trusted-publishers/security-model/
# =============================================================================
name: Publish (Trusted Publishing — manual dispatch only)

on:
  workflow_dispatch: {}   # no push/tag/release triggers, on purpose

permissions:
  contents: read

jobs:
  build:
    name: Build + verify tag == version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"
      - name: Require a version tag whose version == elphgap.__version__
        run: |
          case "$GITHUB_REF" in
            refs/tags/v*) ;;
            *) echo "::error::dispatch this workflow from a version tag (refs/tags/vX.Y.Z), got $GITHUB_REF"; exit 1 ;;
          esac
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(python -c "import re,pathlib;print(re.search(r'__version__ = \"([^\"]+)\"', pathlib.Path('src/elphgap/__init__.py').read_text()).group(1))")
          echo "tag=$TAG  package=__version__=$VERSION"
          test "$TAG" = "$VERSION" || { echo "::error::tag v$TAG != elphgap.__version__ $VERSION"; exit 1; }
      - name: Build wheel + sdist and metadata-check
        run: |
          python -m pip install --upgrade build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi              # create this environment (with reviewers) before use
    permissions:
      id-token: write              # OIDC token for trusted publishing (no secret)
    steps:
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4.1.8
        with:
          name: dist
          path: dist/
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@15c56dba361d8335944d31a2ecd17d700fc7bcbc  # v1.12.2
        with:
          attestations: true       # PEP 740 provenance attestations
